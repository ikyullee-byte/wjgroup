<section>
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-blue-950 flex items-center">
            <span class="w-1.5 h-5 bg-blue-600 rounded-full mr-2"></span>교회 소식
        </h2>
    </div>
    <div class="space-y-3">
        <div onclick="openModal()" class="bg-orange-50 p-5 rounded-2xl shadow-sm border-l-4 border-orange-500 flex justify-between items-center active:scale-[0.98] transition cursor-pointer group">
            <div class="flex-1">
                <div class="flex items-center mb-1">
                    <span class="bg-orange-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold mr-2 uppercase">Notice</span>
                    <h3 class="text-sm font-bold text-gray-800 group-hover:text-orange-600">이번 주 기관장 월례 모임 안내</h3>
                </div>
                <p class="text-[11px] text-gray-500">1·2·3여전도회, 남전도회, 교회학교</p>
            </div>
            <i class="fas fa-chevron-right text-orange-300 text-xs"></i>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-blue-600 flex justify-between items-center active:bg-gray-50 transition">
            <h3 class="text-sm font-medium text-gray-800">2026년 봄 정기 심방 일정 안내</h3>
            <span class="text-gray-400 text-[10px]">03.04</span>
        </div>
    </div>
</section>

<div id="noticeModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center px-6">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl relative z-[210] overflow-hidden animate-in fade-in zoom-in duration-300">
        <div class="bg-orange-500 p-6 text-white text-center">
            <i class="fas fa-bullhorn text-3xl mb-2"></i>
            <h4 class="text-lg font-bold">기관장 모임 안내</h4>
        </div>
        <div class="p-8">
            <div class="space-y-4 text-sm text-gray-600">
                <div class="flex items-start">
                    <span class="font-bold text-orange-600 w-16 shrink-0">일시</span>
                    <span>이번 주 주일 오후 1:30 (예배 후)</span>
                </div>
                <div class="flex items-start">
                    <span class="font-bold text-orange-600 w-16 shrink-0">장소</span>
                    <span>교회 소회의실</span>
                </div>
                <div class="flex items-start border-t pt-4">
                    <span class="font-bold text-orange-600 w-16 shrink-0">대상</span>
                    <div class="leading-6 font-medium text-gray-800">
                        • 제 1·2·3 여전도회장<br>
                        • 남전도회장<br>
                        • 교회학교 부장
                    </div>
                </div>
                <p class="text-xs bg-gray-50 p-3 rounded-xl text-gray-500 leading-5">
                    * 각 기관의 3월 사역 보고 및 부흥 계획을 논의하는 시간입니다. 모든 기관장님들께서는 필히 참석해 주시기 바랍니다.
                </p>
            </div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 bg-gray-900 text-white rounded-2xl font-bold active:scale-95 transition">닫기</button>
        </div>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById('noticeModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
    }
    function closeModal() {
        document.getElementById('noticeModal').classList.add('hidden');
        document.body.style.overflow = 'auto'; // 스크롤 복구
    }
</script>
